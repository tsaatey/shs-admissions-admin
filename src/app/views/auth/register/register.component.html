<div
  class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center"
>
  <c-container>
    <c-row class="justify-content-center">
      <c-col lg="7" md="9" xl="6">
        <c-card class="mx-4">
          <c-card-body class="p-4">
            <form cForm>
              <h4>Sign up</h4>
              <p class="text-body-secondary">
                Create your school account or
                <span
                  style="cursor: pointer"
                  class="text-primary"
                  routerLink="/login"
                  >Login</span
                >
              </p>
              <label cLabel for="schoolName">School name</label>
              <c-input-group class="mb-3">
                <input
                  cFormControl
                  id="schoolName"
                  placeholder="Name of school"
                />
              </c-input-group>

              <label cLabel for="schoolCode">School code</label>
              <c-input-group class="mb-3">
                <input
                  cFormControl
                  id="schoolName"
                  placeholder="Name of school"
                />
              </c-input-group>

              <label cLabel for="schoolAddress">School address</label>
              <c-input-group class="mb-3">
                <input
                  cFormControl
                  id="schoolName"
                  placeholder="Name of school"
                />
              </c-input-group>

              <label cLabel for="schoolLocation">School location</label>
              <c-input-group class="mb-3">
                <input
                  cFormControl
                  id="schoolName"
                  placeholder="Name of school"
                />
              </c-input-group>

              <div class="d-grid">
                <button cButton color="primary" class="text-white">
                  Let's go!
                </button>
              </div>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
