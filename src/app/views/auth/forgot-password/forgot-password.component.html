<div
  class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center"
>
  <c-container>
    <c-row class="justify-content-center">
      <c-col lg="7" md="9" xl="6">
        <c-card class="mx-4">
          <c-card-body class="p-4">
            <form cForm [formGroup]="form" (ngSubmit)="onForgotPassword()">
              <h4>Forgot password</h4>
              <p class="text-body-secondary">
                Enter the email address associated with your account for
                verification
              </p>
              <label cLabel for="email">Email address</label>
              <c-input-group class="mb-3">
                <input
                  cFormControl
                  id="email"
                  formControlName="email"
                  placeholder="E.g. peter_t@gmail.com"
                />
              </c-input-group>

              <div class="d-grid">
                <button
                  cButton
                  type="submit"
                  color="primary"
                  class="text-white"
                  [disabled]="form.invalid || (loading | async) === true"
                >
                  <span *ngIf="(loading | async) === false">Proceed</span>
                  <span *ngIf="(loading | async) === true">Please wait...</span>
                </button>
              </div>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
