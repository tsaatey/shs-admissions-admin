<c-card class="my-4">
  <c-card-body>
    <c-row>
      <c-col sm="5">
        <h6>Upload Documents</h6>
        <br />
        <form cForm>
          <label cLabel for="file">Choose file (PDF format only)</label>
          <c-input-group class="mb-3">
            <input type="file" id="file" cFormControl />
          </c-input-group>

          <label cLabel for="name">Document name</label>
          <c-input-group class="mb-3">
            <input type="text" id="name" cFormControl />
          </c-input-group>

          <label cLabel for="description">Document description</label>
          <c-input-group class="mb-3">
            <input type="text" id="description" cFormControl />
          </c-input-group>

          <div class="d-grid">
            <button cButton type="button" class="text-white" color="primary">
              Upload
            </button>
          </div>
        </form>
      </c-col>
      <c-col sm="7" class="my-4">
        <table mat-table>
          <!-- House name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Document name</th>
            <td mat-cell *matCellDef="let element">
              {{ element.name }}
            </td>
          </ng-container>

          <!-- House master Column -->
          <ng-container matColumnDef="uploadedOn">
            <th mat-header-cell *matHeaderCellDef>Uploaded on</th>
            <td mat-cell *matCellDef="let element">
              {{ element.createdAt | date : "short" }}
            </td>
          </ng-container>

          <!-- Ellipse menu Column -->
          <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef>Action</th>
            <td mat-cell *matCellDef="let element">
              <span [matMenuTriggerFor]="menu">
                <mat-icon role="button">more_vert</mat-icon>
              </span>
              <mat-menu #menu="matMenu">
                <button mat-menu-item>
                  <mat-icon>preview</mat-icon>
                  <span>&nbsp;View</span>
                </button>
                <button mat-menu-item>
                  <mat-icon>delete_forever</mat-icon>
                  <span>&nbsp;Delete</span>
                </button>
              </mat-menu>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="documentColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: documentColumns"></tr>
        </table>
        <mat-paginator
          showFirstLastButtons=""
          [pageSizeOptions]="[10, 40, 60]"
          aria-label="Select page"
          [style.marginTop]="'16px'"
          #housePaginator
        >
        </mat-paginator>
      </c-col>
    </c-row>
  </c-card-body>
</c-card>
